<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
    
    <!-- Play Button Gradient -->
    <linearGradient id="play-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>

    <!-- Sparkle 1 Gradient -->
    <linearGradient id="sparkle-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Sparkle 2 Gradient -->
    <linearGradient id="sparkle-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    
    <!-- Drop Shadow Filter -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#090514" flood-opacity="0.45" />
    </filter>
  </defs>

  <!-- Background Squircle -->
  <rect width="480" height="480" x="16" y="16" rx="120" fill="url(#bg-grad)" />
  
  <!-- Subtle Inner Border for Premium Look -->
  <rect width="476" height="476" x="18" y="18" rx="118" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.15" />

  <!-- Main Content Group with Drop Shadow -->
  <g filter="url(#drop-shadow)">
    <!-- White Film Strip Frame -->
    <rect x="106" y="106" width="300" height="300" rx="44" fill="#ffffff" />
    
    <!-- Dark Inner Film Screen -->
    <rect x="156" y="136" width="200" height="240" rx="20" fill="#0f172a" />
    
    <!-- Film Strip Sprocket Holes (Left) -->
    <rect x="122" y="146" width="16" height="24" rx="6" fill="#0f172a" />
    <rect x="122" y="206" width="16" height="24" rx="6" fill="#0f172a" />
    <rect x="122" y="266" width="16" height="24" rx="6" fill="#0f172a" />
    <rect x="122" y="326" width="16" height="24" rx="6" fill="#0f172a" />

    <!-- Film Strip Sprocket Holes (Right) -->
    <rect x="374" y="146" width="16" height="24" rx="6" fill="#0f172a" />
    <rect x="374" y="206" width="16" height="24" rx="6" fill="#0f172a" />
    <rect x="374" y="266" width="16" height="24" rx="6" fill="#0f172a" />
    <rect x="374" y="326" width="16" height="24" rx="6" fill="#0f172a" />

    <!-- Play Button (Gradient Triangle with rounded corners via stroke) -->
    <path d="M 226 196 L 306 256 L 226 316 Z" 
          fill="url(#play-grad)" 
          stroke="url(#play-grad)" 
          stroke-width="16" 
          stroke-linejoin="round" />

    <!-- Sparkle 1 (Top-Right, representing AI magic/matches) -->
    <path d="M 315 150 Q 315 165 330 165 Q 315 165 315 180 Q 315 165 300 165 Q 315 165 315 150 Z" 
          fill="url(#sparkle-gold)" />

    <!-- Sparkle 2 (Bottom-Left, smaller AI spark) -->
    <path d="M 195 305 Q 195 315 205 315 Q 195 315 195 325 Q 195 315 185 315 Q 195 315 195 305 Z" 
          fill="url(#sparkle-cyan)" />
  </g>
</svg>
